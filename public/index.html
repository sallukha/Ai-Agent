<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0">
    <title>AI Agent Dashboard</title>
    <meta name="description" content="A premium chat interface connecting to the AI agent.">
    <!-- Modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container  mt-30">
        <header class="app-header">
            <div class="header-logo">
                <div class="logo-circle"></div>
                <h1>Agent AI</h1>
            </div>
            <div class="header-status">
                <button id="voiceToggleBtn" class="voice-toggle" aria-label="Toggle AI Voice" title="Toggle AI Voice">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11 5L6 9H2V15H6L11 19V5Z" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path id="volumeWaves"
                            d="M15.54 8.46C16.4774 9.39764 17.004 10.6692 17.004 11.995C17.004 13.3208 16.4774 14.5924 15.54 15.53M19.07 4.93C20.9447 6.80527 21.9979 9.34835 21.9979 12C21.9979 14.6516 20.9447 17.1947 19.07 19.07"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <div class="status-indicator">
                    <span class="status-dot"></span> Online
                </div>
            </div>
        </header>

        <main class="chat-container mb-30">
            <div class="messages-wrapper" id="messagesWrapper">
                <div class="message ai-message">
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        Hello! I am your personal AI Agent. How can I help you today?
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form id="chatForm" class="chat-form">
                    <button type="button" id="micBtn" class="mic-btn" aria-label="Start voice input"
                        title="Use Microphone">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 2C10.8954 2 10 2.89543 10 4V12C10 13.1046 10.8954 14 12 14C13.1046 14 14 13.1046 14 12V4C14 2.89543 13.1046 2 12 2Z"
                                fill="currentColor" />
                            <path
                                d="M19 10V12C19 15.866 15.866 19 12 19M5 10V12C5 15.866 8.13401 19 12 19M12 19V22M8 22H16"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                    <input type="text" id="userInput" placeholder="Message the AI..." autocomplete="off">
                    <button type="submit" id="sendBtn" class="send-btn" aria-label="Send message">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
